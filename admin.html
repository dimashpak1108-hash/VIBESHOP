<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE | СИСТЕМА АНАЛІТИКИ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #8b5cf6;
            --bg: #020617;
            --card: #0f172a;
            --text: #ffffff;
            --sub-text: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 5%;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo { 
            font-size: 24px; 
            font-weight: 800; 
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--accent)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* Картки статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .stat-card h3 { font-size: 13px; color: var(--sub-text); text-transform: uppercase; margin-bottom: 10px; }
        .stat-card p { font-size: 32px; font-weight: 800; color: var(--text); }
        .stat-card .unit { color: var(--accent); font-size: 18px; margin-left: 5px; }

        /* Секція графіків */
        .charts-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .chart-box {
            background: var(--card);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
            position: relative;
            min-height: 450px; /* Фіксована висота */
        }

        .chart-wrapper {
            position: relative;
            height: 320px; /* Обмеження висоти самого графіка */
            width: 100%;
        }

        h2 { margin-bottom: 25px; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        h2::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 10px; }

        /* Лідер продажів */
        .top-product-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .top-emoji { font-size: 80px; margin-bottom: 15px; filter: drop-shadow(0 10px 20px rgba(139, 92, 246, 0.3)); }
        .top-name { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .top-meta { color: var(--sub-text); font-size: 16px; }

        .btn-refresh {
            background: rgba(139, 92, 246, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-refresh:hover { background: var(--accent); color: white; }

        @media (max-width: 1000px) {
            .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">VIBE ANALYTICS 2026</div>
        <button class="btn-refresh" onclick="location.reload()">ОНОВИТИ ЗВІТ</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Виручка</h3>
            <p id="total-revenue">0<span class="unit">₴</span></p>
        </div>
        <div class="stat-card">
            <h3>Замовлення</h3>
            <p id="total-orders">0</p>
        </div>
        <div class="stat-card">
            <h3>Середній чек</h3>
            <p id="avg-check">0<span class="unit">₴</span></p>
        </div>
        <div class="stat-card">
            <h3>Продано одиниць</h3>
            <p id="total-items">0</p>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <h2>ПОПУЛЯРНІСТЬ ТОВАРІВ</h2>
            <div class="chart-wrapper">
                <canvas id="productsChart"></canvas>
            </div>
        </div>

        <div class="chart-box">
            <h2>ЛІДЕР ПРОДАЖІВ</h2>
            <div class="top-product-display" id="top-ui">
                <div class="top-emoji" id="top-icon">⏳</div>
                <div class="top-name" id="top-name">Чекаємо замовлень...</div>
                <div class="top-meta" id="top-count">Статистика порожня</div>
            </div>
        </div>
    </div>

    <script>
        function initAnalytics() {
            const data = localStorage.getItem('vibe_orders');
            const orders = data ? JSON.parse(data) : [];

            if (orders.length === 0) return;

            let totalRev = 0;
            let itemsCount = 0;
            let productMap = {};

            orders.forEach(order => {
                totalRev += order.total;
                itemsCount += order.items.length;
                order.items.forEach(item => {
                    productMap[item.name] = (productMap[item.name] || 0) + 1;
                });
            });

            // Цифри
            document.getElementById('total-revenue').innerHTML = `${totalRev.toLocaleString()}<span class="unit">₴</span>`;
            document.getElementById('total-orders').innerText = orders.length;
            document.getElementById('total-items').innerText = itemsCount;
            document.getElementById('avg-check').innerHTML = `${Math.round(totalRev / orders.length).toLocaleString()}<span class="unit">₴</span>`;

            // Топ товар
            const sorted = Object.entries(productMap).sort((a, b) => b[1] - a[1]);
            const top = sorted[0];
            const icons = {"Футболка": "👕", "Худі": "🧥", "Бомбер": "🧥", "Кепка": "🧢", "Шапка": "🧶", "Оверсайз футболка": "👕", "Штани Карго": "👖", "Шопер": "👜"};
            
            document.getElementById('top-icon').innerText = icons[top[0]] || "📦";
            document.getElementById('top-name').innerText = top[0];
            document.getElementById('top-count').innerText = `Замовлено ${top[1]} раз(ів)`;

            // Графік
            const ctx = document.getElementById('productsChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(productMap),
                    datasets: [{
                        label: 'Продано штук',
                        data: Object.values(productMap),
                        backgroundColor: '#8b5cf6',
                        hoverBackgroundColor: '#d946ef',
                        borderRadius: 10,
                        borderSkipped: false,
                        barThickness: 40, // Фіксована ширина стовпчика, щоб не розносило на весь екран
                        maxBarThickness: 50
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleFont: { size: 14, weight: 'bold' },
                            padding: 12,
                            cornerRadius: 10,
                            displayColors: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                            ticks: { color: '#94a3b8', stepSize: 1 }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        window.onload = initAnalytics;
    </script>
</body>
</html>
