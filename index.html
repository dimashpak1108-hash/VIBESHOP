<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBESHOP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --kolir-osnovnyi: #8b5cf6;
            --kolir-aktsent: #d946ef;
            --fon-temnyi: #020617;
            --fon-kartky: #0f172a;
            --tekst-bilyi: #ffffff;
            --tekst-siryi: #94a3b8;
            --kolir-pomylky: #ef4444;
            --kolir-uspihu: #10b981;
            --ramka: 2px solid rgba(255, 255, 255, 0.1);
            --bez-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--fon-temnyi); }
        ::-webkit-scrollbar-thumb { 
            background: var(--kolir-osnovnyi); 
            border-radius: 10px;
            border: 2px solid var(--fon-temnyi);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--fon-temnyi);
            color: var(--tekst-bilyi);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(217, 70, 239, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
        }

        #toast-container {
            position: fixed; bottom: 30px; right: 30px;
            z-index: 10000; display: flex; flex-direction: column; gap: 12px;
            pointer-events: none;
        }

        .toast-item {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-left: 6px solid var(--kolir-osnovnyi);
            padding: 18px 30px; border-radius: 20px;
            color: white; font-weight: 800;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: translateX(180%);
            transition: 0.6s var(--bez-curve);
            display: flex; align-items: center; gap: 15px;
            pointer-events: auto;
        }

        .toast-item.show { transform: translateX(0); }
        .toast-item.success { border-left-color: var(--kolir-uspihu); }
        .toast-item.error { border-left-color: var(--kolir-pomylky); }

        header {
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(25px);
            border-bottom: var(--ramka); position: sticky; top: 0; z-index: 900;
        }

        .logo {
            font-size: 34px; font-weight: 900; cursor: pointer;
            background: linear-gradient(to right, #fff, var(--kolir-osnovnyi));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: 0.3s;
        }
        .logo:hover { filter: drop-shadow(0 0 10px var(--kolir-osnovnyi)); }

        .cart-btn {
            padding: 14px 28px; border-radius: 18px; border: 2px solid var(--kolir-osnovnyi);
            background: rgba(139, 92, 246, 0.1); color: white; font-weight: 800; cursor: pointer;
            transition: 0.4s var(--bez-curve); display: flex; align-items: center; gap: 12px;
        }
        .cart-btn:hover { background: var(--kolir-osnovnyi); transform: translateY(-3px) scale(1.05); }

        .page { display: none; padding: 60px 8%; animation: pageIn 0.8s var(--bez-curve) forwards; }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .card {
            background: var(--fon-kartky); border-radius: 45px; padding: 45px 30px; text-align: center;
            border: var(--ramka); cursor: pointer; transition: 0.5s var(--bez-curve);
            position: relative; overflow: hidden;
        }
        .card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, transparent, rgba(139, 92, 246, 0.05)); opacity: 0; transition: 0.5s;
        }
        .card:hover { transform: translateY(-15px); border-color: var(--kolir-osnovnyi); box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        .card:hover::after { opacity: 1; }
        .card span { font-size: 85px; display: block; margin-bottom: 20px; transition: 0.5s; }
        .card:hover span { transform: scale(1.15) rotate(5deg); }

        .editor-container { display: flex; gap: 60px; flex-wrap: wrap; justify-content: center; }
        .canvas-area {
            background: #fff; padding: 12px; border-radius: 35px;
            border: 12px solid #1e293b; box-shadow: 0 45px 90px rgba(0,0,0,0.6);
        }
        canvas { cursor: crosshair; touch-action: none; border-radius: 20px; background: white; }

        .color-palette { display: flex; gap: 15px; margin: 30px 0; }
        .color-dot {
            width: 50px; height: 50px; border-radius: 18px; cursor: pointer;
            border: 4px solid transparent; transition: 0.4s var(--bez-curve);
        }
        .color-dot.active { transform: scale(1.3); border-color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .btn-main {
            width: 100%; padding: 22px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--kolir-osnovnyi), var(--kolir-aktsent));
            color: white; font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
        }
        .btn-main:hover { transform: translateY(-4px); filter: brightness(1.1); box-shadow: 0 15px 35px rgba(217, 70, 239, 0.4); }
        .btn-main:disabled { filter: grayscale(1); cursor: not-allowed; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000;
            padding: 20px;
        }
        
        .modal-content {
            background: #0f172a; width: 100%; max-width: 550px; padding: 40px;
            border-radius: 45px; border: 2px solid var(--kolir-osnovnyi);
            max-height: 85vh; display: flex; flex-direction: column;
            animation: modalIn 0.5s var(--bez-curve);
        }
        @keyframes modalIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #cart-list { 
            overflow-y: auto; flex-grow: 1; margin: 25px 0; padding-right: 10px;
            scrollbar-width: thin; scrollbar-color: var(--kolir-osnovnyi) transparent;
        }

        .cart-row {
            background: rgba(255,255,255,0.04); padding: 20px; border-radius: 20px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); animation: pageIn 0.3s ease;
        }

        .del-btn {
            background: rgba(239, 68, 68, 0.1); color: var(--kolir-pomylky);
            border: 1px solid var(--kolir-pomylky); padding: 8px 12px; border-radius: 12px;
            font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 12px;
        }
        .del-btn:hover { background: var(--kolir-pomylky); color: white; }

        .input-f {
            width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 16px;
            border: 2px solid #334155; background: #1e293b; color: white; font-size: 16px;
            transition: 0.3s;
        }
        .input-f:focus { border-color: var(--kolir-osnovnyi); outline: none; background: #232f44; }

        .btn-close { text-align: center; margin-top: 20px; cursor: pointer; opacity: 0.5; font-weight: 700; }
        .btn-close:hover { opacity: 1; color: var(--kolir-pomylky); }

    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <div class="logo" onclick="showPage('home')">VIBESHOP</div>
        <button class="cart-btn" onclick="openCart()">
            🛒 КОШИК (<span id="count">0</span>)
        </button>
    </header>

    <main id="home" class="page active">
        <h1 style="text-align: center; font-size: 45px; margin-bottom: 10px;">ОБЕРИ СВІЙ МЕРЧ</h1>
        <p style="text-align: center; color: var(--tekst-siryi); margin-bottom: 50px;">Цифрова платформа для твого дизайну</p>
        <div class="catalog-grid" id="catalog"></div>
    </main>

    <section id="editor" class="page">
        <div style="cursor:pointer; color:var(--kolir-osnovnyi); font-weight:800; margin-bottom:40px; display:inline-block;" onclick="showPage('home')">
            ← ПОВЕРНУТИСЬ ДО КАТАЛОГУ
        </div>
        
        <div class="editor-container">
            <div class="canvas-area">
                <canvas id="paint"></canvas>
            </div>
            
            <div style="flex:1; max-width:450px;">
                <h2 id="p-title" style="font-size:42px; line-height:1;">Товар</h2>
                <div id="p-price" style="font-size:32px; color:var(--kolir-osnovnyi); font-weight:800; margin:20px 0 30px 0;">0 ₴</div>
                
                <p style="text-transform: uppercase; font-size: 12px; letter-spacing: 1px; opacity: 0.6; margin-bottom: 15px;">Колір пензля:</p>
                <div class="color-palette">
                    <div class="color-dot active" style="background: #000;" data-c="#000"></div>
                    <div class="color-dot" style="background: #ffffff; border: 1px solid #ccc;" data-c="#ffffff"></div>
                    <div class="color-dot" style="background: #8b5cf6;" data-c="#8b5cf6"></div>
                    <div class="color-dot" style="background: #ef4444;" data-c="#ef4444"></div>
                    <div class="color-dot" style="background: #10b981;" data-c="#10b981"></div>
                    <div class="color-dot" style="background: #3b82f6;" data-c="#3b82f6"></div>
                </div>
                
                <button class="btn-main" onclick="addToCart()">ДОДАТИ В КОШИК</button>
                <div onclick="clearCanvas()" style="text-align:center; margin-top:20px; cursor:pointer; color:var(--tekst-siryi); font-weight:600;">Очистити малюнок</div>
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="cart-modal">
        <div class="modal-content">
            <h2 style="text-align:center; font-size: 28px;">Мій вибір</h2>
            <div id="cart-list"></div>
            <div id="cart-footer" style="display:none; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:22px; font-weight:800;">
                    <span>РАЗОМ:</span>
                    <span id="cart-total" style="color:var(--kolir-osnovnyi);">0 ₴</span>
                </div>
                <button class="btn-main" onclick="openOrder()">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
            </div>
            <div class="btn-close" onclick="closeModals()">ЗАКРИТИ</div>
        </div>
    </div>

    <div class="modal-overlay" id="order-modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:30px;">Доставка</h2>
            <input type="text" id="u-name" class="input-f" placeholder="Твоє ім'я">
            <input type="tel" id="u-tel" class="input-f" placeholder="Номер телефону">
            <input type="text" id="u-addr" class="input-f" placeholder="Місто та відділення пошти">
            
            <button class="btn-main" id="send-order-btn" onclick="submitToTelegram()">ПІДТВЕРДИТИ В TELEGRAM</button>
            <div class="btn-close" onclick="openCart()">Повернутись назад</div>
        </div>
    </div>

    <script>
        // ===================================================================
        // ВАШ ТОКЕН ВЖЕ ВСТАВЛЕНО:
        // ===================================================================

        const TG_TOKEN = "8311642022:AAGF3yAUYdwL4Wt0ewL9bbdJzKS0lR1-ero"; 
        
        // СЮДИ ВСТАВ ЦИФРИ СВОГО ID (ОТРИМАЙ ЇХ У БОТА @userinfobot):
        const TG_CHAT_ID = "6837205156"; 

        // ===================================================================
        // НИЖЧЕ НІЧОГО НЕ ЗМІНЮЙ!
        // ===================================================================

        const products = [
            { id: 1, name: "Футболка Базова", price: 750, icon: "👕" },
            { id: 2, name: "Oversize Худі", price: 1650, icon: "🧥" },
            { id: 3, name: "Кепка Тракер", price: 500, icon: "🧢" },
            { id: 4, name: "Еко-шопер", price: 350, icon: "👜" },
            { id: 5, name: "Світшот Premium", price: 1300, icon: "👚" },
            { id: 6, name: "Спортивні штани", price: 1100, icon: "👖" }
        ];

        let cart = [];
        let currentProduct = null;
        let isDrawing = false;
        let isPainted = false;
        let brushColor = "#000";

        const canvas = document.getElementById('paint');
        const ctx = canvas.getContext('2d');

        function notify(msg, type='info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-item ${type}`;
            toast.innerHTML = `<span>${type==='success'?'✅':'✨'}</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 600);
            }, 3000);
        }

        function renderCatalog() {
            const grid = document.getElementById('catalog');
            products.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = (index * 0.1) + 's';
                card.innerHTML = `<span>${p.icon}</span><h3>${p.name}</h3><p style="color:var(--kolir-osnovnyi); font-weight:800; margin-top:10px;">${p.price} ₴</p>`;
                card.onclick = () => openEditor(p);
                grid.appendChild(card);
            });
        }

        function openEditor(p) {
            currentProduct = p;
            document.getElementById('p-title').innerText = p.name;
            document.getElementById('p-price').innerText = p.price + " ₴";
            showPage('editor');
            setupCanvas();
        }

        function setupCanvas() {
            const size = window.innerWidth > 500 ? 450 : 320;
            canvas.width = size; canvas.height = size;
            ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = brushColor;
            isPainted = false;
        }

        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); isPainted = false; notify("Очищено!"); }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.clientX || e.touches[0].clientX;
            const cy = e.clientY || e.touches[0].clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function start(e) { isDrawing = true; isPainted = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.type==='touchstart') e.preventDefault(); }
        function move(e) { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
        function end() { isDrawing = false; ctx.closePath(); }

        canvas.onmousedown = canvas.ontouchstart = start;
        canvas.onmousemove = canvas.ontouchmove = move;
        window.onmouseup = window.ontouchend = end;

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.onclick = () => {
                document.querySelector('.color-dot.active').classList.remove('active');
                dot.classList.add('active');
                brushColor = dot.dataset.c;
                ctx.strokeStyle = brushColor;
            };
        });

        function addToCart() {
            const label = isPainted ? " (Дизайнерська)" : " (Базова)";
            cart.push({ id: Date.now(), name: currentProduct.name + label, price: currentProduct.price });
            updateCartUI();
            notify(`${currentProduct.name} у кошику!`, 'success');
            showPage('home');
        }

        function updateCartUI() {
            document.getElementById('count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            list.innerHTML = "";
            let total = 0;

            if(cart.length === 0) {
                list.innerHTML = "<p style='text-align:center; opacity:0.3; padding:50px;'>Кошик порожній...</p>";
                document.getElementById('cart-footer').style.display = 'none';
                return;
            }

            cart.forEach(item => {
                total += item.price;
                const row = document.createElement('div');
                row.className = 'cart-row';
                row.innerHTML = `
                    <div style="max-width:70%">
                        <div style="font-weight:800; font-size:14px;">${item.name}</div>
                        <div style="color:var(--kolir-osnovnyi); font-weight:700;">${item.price} ₴</div>
                    </div>
                    <button class="del-btn" onclick="removeFromCart(${item.id})">ВИДАЛИТИ</button>
                `;
                list.appendChild(row);
            });

            document.getElementById('cart-total').innerText = total + " ₴";
            document.getElementById('cart-footer').style.display = 'block';
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
            notify("Видалено", "error");
        }

        async function submitToTelegram() {
            const uName = document.getElementById('u-name').value;
            const uTel = document.getElementById('u-tel').value;
            const uAddr = document.getElementById('u-addr').value;

            if(!uName || !uTel || !uAddr) { notify("Заповни всі поля!", "error"); return; }

            const btn = document.getElementById('send-order-btn');
            btn.disabled = true; btn.innerText = "НАДСИЛАННЯ...";

            let text = `🚀 **НОВЕ ЗАМОВЛЕННЯ 2026**\n\n👤 Клієнт: ${uName}\n📞 Тел: ${uTel}\n📍 Адреса: ${uAddr}\n\n📦 ТОВАРИ:\n`;
            cart.forEach((i, n) => text += `${n+1}. ${i.name} — ${i.price} ₴\n`);
            text += `\n💰 **РАЗОМ: ${document.getElementById('cart-total').innerText}**`;

            try {
                const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text, parse_mode: 'Markdown' })
                });

                if(res.ok) {
                    notify("Замовлення надіслано в TG!", "success");
                    cart = []; updateCartUI(); closeModals(); showPage('home');
                } else { notify("Помилка API", "error"); }
            } catch (e) { notify("Немає зв'язку", "error"); }

            btn.disabled = false; btn.innerText = "ПІДТВЕРДИТИ В TELEGRAM";
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openCart() { closeModals(); document.getElementById('cart-modal').style.display = 'flex'; }
        function openOrder() { closeModals(); document.getElementById('order-modal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        renderCatalog();
        updateCartUI();

    </script>
</body>
</html>
